  <!-- luminous accretion arc -->
  <path d="M 249.17 406.35 A 290 250 0 0 1 774.83 617.65" fill="none" stroke="#D4A04A" stroke-width="62" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 249.17 406.35 A 290 250 0 0 1 774.83 617.65" fill="none" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)"/>

  <!-- miller's planet -->
  <circle cx="755" cy="655" r="74" fill="#D4A04A" />
  <circle cx="755" cy="655" r="64" fill="none" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="6"/>
